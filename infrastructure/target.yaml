AWSTemplateFormatVersion: "2010-09-09"
Description: AgentCore Gateway target for IAM-authorized AgentCore Runtime MCP servers.

Parameters:
  GatewayIdentifier:
    Type: String
  TargetName:
    Type: String
    Default: data-agent
  TargetDescription:
    Type: String
    Default: Public MCP target for ask_database.
  RuntimeEndpointUrl:
    Type: String
  AllowedRequestHeaders:
    Type: CommaDelimitedList
    Default: "Mcp-Session-Id,x-data-agent-grants,x-data-agent-identity,x-data-agent-issued-at,x-data-agent-signature"
  AllowedResponseHeaders:
    Type: CommaDelimitedList
    Default: "Mcp-Session-Id"

Resources:
  GatewayTarget:
    Type: AWS::BedrockAgentCore::GatewayTarget
    Properties:
      GatewayIdentifier: !Ref GatewayIdentifier
      Name: !Ref TargetName
      Description: !Ref TargetDescription
      MetadataConfiguration:
        AllowedRequestHeaders: !Ref AllowedRequestHeaders
        AllowedResponseHeaders: !Ref AllowedResponseHeaders
      TargetConfiguration:
        Mcp:
          McpServer:
            Endpoint: !Ref RuntimeEndpointUrl
      CredentialProviderConfigurations:
        - CredentialProviderType: GATEWAY_IAM_ROLE
          CredentialProvider:
            IamCredentialProvider:
              Service: bedrock-agentcore
              Region: !Ref AWS::Region

Outputs:
  GatewayTargetId:
    Value: !GetAtt GatewayTarget.TargetId
