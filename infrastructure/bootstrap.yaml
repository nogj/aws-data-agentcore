AWSTemplateFormatVersion: "2010-09-09"
Description: Bootstrap resources for the read-only data agent.

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, pre, prod]
  ArtifactBucketName:
    Type: String
  JwtDiscoveryUrl:
    Type: String
  JwtAllowedAudience:
    Type: String
  RequiredScope:
    Type: String
    Default: data:read
  AuthorizationMode:
    Type: String
    Default: scopes
    AllowedValues: [scopes, claims]
  AcceptedClaims:
    Type: CommaDelimitedList
    Default: "scope,scp,roles"
  IdentityClaims:
    Type: CommaDelimitedList
    Default: "sub,oid,preferred_username,appid,azp,tid"
  NoncurrentVersionRetentionDays:
    Type: Number
    Default: 90
    MinValue: 1
  LogRetentionDays:
    Type: Number
    Default: 30
    MinValue: 1

Conditions:
  UseGatewayAllowedScopes: !Equals [!Ref AuthorizationMode, scopes]

Resources:
  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref ArtifactBucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: AbortIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
          - Id: ExpireOldArtifacts
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: !Ref NoncurrentVersionRetentionDays

  ArtifactBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ArtifactBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: s3:*
            Resource:
              - !GetAtt ArtifactBucket.Arn
              - !Sub "${ArtifactBucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: "false"

  GatewayRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "data-agent-gateway-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock-agentcore.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
              ArnLike:
                aws:SourceArn: !Sub "arn:${AWS::Partition}:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:*"
      Policies:
        - PolicyName: InvokeAgentCoreRuntime
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: bedrock-agentcore:InvokeAgentRuntime
                Resource: "*"
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt ScopePropagationFunction.Arn

  ScopePropagationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "data-agent-scope-propagation-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole"
      Policies:
        - PolicyName: ReadInternalContextSigningSecret
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref HeaderSigningSecret

  HeaderSigningSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "/data-agent/${Environment}/gateway-header-signing"
      Description: Shared secret used by the Gateway interceptor to sign internal Runtime context JWTs.
      GenerateSecretString:
        SecretStringTemplate: "{}"
        GenerateStringKey: secret
        PasswordLength: 64
        ExcludePunctuation: true

  ScopePropagationFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "data-agent-scope-propagation-${Environment}"
      Description: Propagates validated JWT scopes to the data agent Runtime.
      Runtime: python3.13
      Handler: index.handler
      Role: !GetAtt ScopePropagationRole.Arn
      Timeout: 5
      Environment:
        Variables:
          REQUIRED_SCOPE: !Ref RequiredScope
          ACCEPTED_CLAIMS: !Join [",", !Ref AcceptedClaims]
          IDENTITY_CLAIMS: !Join [",", !Ref IdentityClaims]
          HEADER_SIGNING_SECRET_ARN: !Ref HeaderSigningSecret
          INTERNAL_CONTEXT_ISSUER: data-agent-gateway
          INTERNAL_CONTEXT_DEFAULT_AUDIENCE: runtime:data-agent
          INTERNAL_CONTEXT_TTL_SECONDS: "300"
      Code:
        ZipFile: |
          import base64
          import boto3
          import hashlib
          import hmac
          import json
          import os
          import time


          _SECRET_CACHE = None


          def _claim_values(raw):
              if raw is None:
                  return []
              if isinstance(raw, str):
                  return raw.split()
              return [str(item) for item in raw]


          def _decode_claims(authorization):
              token = authorization.removeprefix("Bearer ").strip()
              payload = token.split(".")[1]
              payload += "=" * (-len(payload) % 4)
              return json.loads(base64.urlsafe_b64decode(payload))


          def _decode_grants(claims):
              accepted_claims = [
                  claim.strip()
                  for claim in os.environ["ACCEPTED_CLAIMS"].split(",")
                  if claim.strip()
              ]
              grants = []
              for claim in accepted_claims:
                  grants.extend(_claim_values(claims.get(claim)))
              return sorted(set(grants))


          def _identity_claims(claims):
              identity_claims = [
                  claim.strip()
                  for claim in os.environ["IDENTITY_CLAIMS"].split(",")
                  if claim.strip()
              ]
              return {
                  claim: claims[claim]
                  for claim in identity_claims
                  if isinstance(claims.get(claim), str) and claims.get(claim)
              }


          def _signing_secret():
              global _SECRET_CACHE
              if _SECRET_CACHE is None:
                  value = boto3.client("secretsmanager").get_secret_value(
                      SecretId=os.environ["HEADER_SIGNING_SECRET_ARN"]
                  )
                  _SECRET_CACHE = json.loads(value["SecretString"])["secret"]
              return _SECRET_CACHE


          def _base64url(raw):
              return base64.urlsafe_b64encode(raw).decode().rstrip("=")


          def _target_audience(event, request):
              for value in (
                  event.get("mcp", {}).get("targetName"),
                  event.get("mcp", {}).get("target"),
                  event.get("mcp", {}).get("gatewayTargetName"),
                  request.get("targetName"),
                  request.get("target"),
                  request.get("gatewayTargetName"),
              ):
                  if isinstance(value, str) and value:
                      return "runtime:" + value
              body = request.get("body", {})
              params = body.get("params", {}) if isinstance(body, dict) else {}
              tool_name = params.get("name") if isinstance(params, dict) else None
              if isinstance(tool_name, str) and "___" in tool_name:
                  return "runtime:" + tool_name.split("___", 1)[0]
              return os.environ["INTERNAL_CONTEXT_DEFAULT_AUDIENCE"]


          def _internal_context_jwt(secret, grants, identity, audience):
              issued_at = int(time.time())
              ttl_seconds = int(os.environ.get("INTERNAL_CONTEXT_TTL_SECONDS", "300"))
              header = {"alg": "HS256", "typ": "JWT"}
              payload = {
                  "ver": "1",
                  "iss": os.environ.get("INTERNAL_CONTEXT_ISSUER", "data-agent-gateway"),
                  "aud": audience,
                  "grants": grants,
                  "identity": identity,
                  "iat": issued_at,
                  "exp": issued_at + ttl_seconds,
              }
              encoded_header = _base64url(
                  json.dumps(header, separators=(",", ":"), sort_keys=True).encode()
              )
              encoded_payload = _base64url(
                  json.dumps(payload, separators=(",", ":"), sort_keys=True).encode()
              )
              signing_input = f"{encoded_header}.{encoded_payload}".encode()
              digest = hmac.new(secret.encode(), signing_input, hashlib.sha256).digest()
              return f"{encoded_header}.{encoded_payload}.{_base64url(digest)}"


          def _affinity_session_id(secret, claims):
              identity_claims = [
                  claim.strip()
                  for claim in os.environ["IDENTITY_CLAIMS"].split(",")
                  if claim.strip()
              ]
              selected = {
                  claim: claims[claim]
                  for claim in identity_claims
                  if isinstance(claims.get(claim), str) and claims.get(claim)
              }
              if not selected:
                  selected = {
                      claim: claims[claim]
                      for claim in ("iss", "sub", "oid", "client_id", "appid", "azp")
                      if isinstance(claims.get(claim), str) and claims.get(claim)
                  }
              material = {
                  "identity": selected,
                  "required_scope": os.environ["REQUIRED_SCOPE"],
                  "function": os.environ.get("AWS_LAMBDA_FUNCTION_NAME", ""),
              }
              payload = json.dumps(material, separators=(",", ":"), sort_keys=True).encode()
              digest = hmac.new(secret.encode(), payload, hashlib.sha256).digest()
              return "aff-" + base64.urlsafe_b64encode(digest).decode().rstrip("=")


          def handler(event, _context):
              request = event.get("mcp", {}).get("gatewayRequest", {})
              headers = request.get("headers", {})
              normalized_headers = {key.lower(): value for key, value in headers.items()}
              try:
                  claims = _decode_claims(normalized_headers.get("authorization", ""))
                  grants = _decode_grants(claims)
                  identity = _identity_claims(claims)
              except Exception:
                  grants = []
                  identity = {}

              required_scope = os.environ["REQUIRED_SCOPE"]
              if required_scope not in grants:
                  return {
                      "interceptorOutputVersion": "1.0",
                      "mcp": {
                          "transformedGatewayResponse": {
                              "statusCode": 200,
                              "body": {
                                  "jsonrpc": "2.0",
                                  "id": request.get("body", {}).get("id"),
                                  "error": {"code": -32001, "message": "Forbidden"},
                              },
                          }
                      },
                  }

              # Never trust client-provided internal headers; derive them from JWT claims.
              forwarded = {
                  key: value
                  for key, value in headers.items()
                  if key.lower()
                  not in {
                      "authorization",
                      "mcp-session-id",
                      "x-data-agent-grants",
                      "x-data-agent-identity",
                      "x-data-agent-issued-at",
                      "x-data-agent-signature",
                      "x-data-agent-context",
                  }
              }
              signing_secret = _signing_secret()
              forwarded["Mcp-Session-Id"] = _affinity_session_id(signing_secret, claims)
              forwarded["x-data-agent-context"] = _internal_context_jwt(
                  signing_secret, grants, identity, _target_audience(event, request)
              )
              return {
                  "interceptorOutputVersion": "1.0",
                  "mcp": {
                      "transformedGatewayRequest": {
                          "headers": forwarded,
                          "body": request.get("body", {}),
                      }
                  },
              }

  ScopePropagationLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ScopePropagationFunction}"
      RetentionInDays: !Ref LogRetentionDays

  Gateway:
    Type: AWS::BedrockAgentCore::Gateway
    Properties:
      Name: !Sub "data-agent-${Environment}"
      Description: Public MCP facade for the read-only data agent.
      ProtocolType: MCP
      ProtocolConfiguration:
        Mcp:
          Instructions: Use ask_database only for authorized read-only database questions.
          SupportedVersions:
            - "2025-06-18"
      AuthorizerType: CUSTOM_JWT
      AuthorizerConfiguration:
        CustomJWTAuthorizer:
          DiscoveryUrl: !Ref JwtDiscoveryUrl
          AllowedAudience:
            - !Ref JwtAllowedAudience
          AllowedScopes:
            !If
              - UseGatewayAllowedScopes
              - [!Ref RequiredScope]
              - !Ref AWS::NoValue
      InterceptorConfigurations:
        - InterceptionPoints:
            - REQUEST
          InputConfiguration:
            PassRequestHeaders: true
          Interceptor:
            Lambda:
              Arn: !GetAtt ScopePropagationFunction.Arn
      RoleArn: !GetAtt GatewayRole.Arn
      Tags:
        Environment: !Ref Environment
        Application: read-only-data-agent

Outputs:
  ArtifactBucketName:
    Value: !Ref ArtifactBucket
  GatewayIdentifier:
    Value: !Ref Gateway
  GatewayUrl:
    Value: !GetAtt Gateway.GatewayUrl
  HeaderSigningSecretArn:
    Value: !Ref HeaderSigningSecret
